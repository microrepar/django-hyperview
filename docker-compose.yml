services:
  db:
    image: postgres:15
    stdin_open: true
    tty: true
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env
    environment:
      - POSTGRES_NAME=${DB_NAME}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 10s
      retries: 20
    networks:
      - django-hyperview_network

  web:
    platform: linux/x86_64
    build: .
    stdin_open: true
    tty: true
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - django-hyperview_network

  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./staticfiles:/code/staticfiles
      - ./media:/code/media
      - ./staticfiles/errors:/etc/nginx/errors
    depends_on:
      - web
    networks:
      - django-hyperview_network

  redis:
    image: redis:6.2
    restart: always
    networks:
      - django-hyperview_network

  worker:
    build: .
    restart: always
    command: celery -A core worker --loglevel=info
    volumes:
      - .:/code
      - ./media:/code/media
    env_file: .env
    depends_on:
      - db
      - redis
    networks:
      - django-hyperview_network
    deploy:
      resources:
        limits:
          cpus: '2.00'
          memory: 2048M
        reservations:
          cpus: '1.00'
          memory: 1024M

volumes:
  postgres_data:

networks:
  django-hyperview_network:
    driver: bridge
